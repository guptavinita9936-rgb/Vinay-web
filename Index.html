<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vinay Creation - Cinematic Experience</title>
    <style>
        /* ========================================================= */
        /* --- 1. BASE STYLES --- */
        /* ========================================================= */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; 
            font-family: 'Arial', sans-serif;
        }

        /* ========================================================= */
        /* --- 2. THE MAGIC (Persistent Rose Petals - BASE LAYER) --- */
        /* ========================================================= */
        #magic-overlay {
            display: block; 
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; 
            z-index: 1; 
        }
        #particleCanvas { width: 100%; height: 100%; }

        /* ========================================================= */
        /* --- 3. THE FLIP SCREEN NOTICE (TOP LAYER) --- */
        /* =================================

        .

        @keyframes pulseText {
            from { opacity: 0.4; } to { opacity: 1; }
        }

        /* ========================================================= */
        /* --- 4. MASTER SCREEN (Matrix Rain + Content) --- */
        /* ========================================================= */
        #master-screen {
            display: none; 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0,0,0,0.3); 
            z-index: 10;
            justify-content: center; align-items: center;
        }

        #rainCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 11; opacity: 0.85; 
        }

        /* --- PHASE 1: COUNTDOWN STYLES --- */
        #countdown-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 12;
            position: absolute;
            width: 100%;
        }

        #countdown-number {
            font-size: 15rem; 
            font-weight: 900;
            color: #ff1493; 
            text-shadow: 0 0 30px rgba(255, 20, 147, 0.8), 0 0 60px rgba(255, 105, 180, 0.5); 
            font-family: 'Arial Black', Impact, sans-serif; 
            animation: popIn 1s ease-in-out infinite alternate;
            margin: 0;
            line-height: 1;
        }

        #countdown-box {
            margin-top: 20px;
            padding: 12px 30px;
            background: rgba(255, 20, 147, 0.1);
            border: 2px solid rgba(255, 20, 147, 0.4);
            border-radius: 12px;
            color: #fff;
            font-size: 1.4rem;
            letter-spacing: 1.5px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(5px);
        }

        #countdown-box.attractive-wish {
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            border: 2px solid #fff;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            box-shadow: 0 0 40px rgba(255, 20, 147, 0.9), 0 0 70px rgba(255, 105, 180, 0.6);
            animation: pulseWish 0.4s infinite alternate;
        }

        @keyframes pulseWish {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* --- PHASE 2: LED TEXT STYLES --- */
        #final-website {
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 12;
            position: absolute;
            width: 100%;
        }

        #led-text {
            font-size: 18vw; 
            font-weight: 900;
            font-family: 'Arial Black', Impact, sans-serif; 
            text-align: center;
            letter-spacing: 4px;
            margin: 0;
            line-height: 1.2;
            color: transparent;
            background-image: radial-gradient(circle, #ffb6c1 45%, transparent 55%);
            background-size: 12px 12px; 
            -webkit-background-clip: text;
            background-clip: text;
            filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.8)) drop-shadow(0 0 20px rgba(255, 105, 180, 0.5));
            animation: popIn 1s ease-in-out infinite alternate;
        }

        /* --- PHASE 3: GIF PHASE STYLES --- */
        #gif-phase {
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20; 
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
        }

        /* Main 75% GIF */
        .central-gif {
            max-width: 75vw;
            max-height: 75vh;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.4);
            transform: scale(0);
            opacity: 0;
            object-fit: contain;
        }

        /* 7-Second Timer Effect (Triggered automatically) */
        .central-gif.zoom-in {
            animation: gifAutoTimer 7.5s forwards;
        }

        /* The Animation: Zoom In, Wait 7s, Shrink */
        @keyframes gifAutoTimer {
            0% { transform: scale(0); opacity: 0; }
            7% { transform: scale(1); opacity: 1; }   
            93% { transform: scale(1); opacity: 1; }  
            100% { transform: scale(0); opacity: 0; } 
        }
        /* --- PHASE 3: GIF PHASE STYLES --- */
        #gif-phase {
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20; 
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
        }

        /* Main 75% GIF */
        .central-gif {
            max-width: 75vw;
            max-height: 75vh;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.4);
            transform: scale(0);
            opacity: 0;
            object-fit: contain;
        }

        /* 7-Second Timer Effect (Triggered automatically) */
        .central-gif.zoom-in {
            animation: gifAutoTimer 7.5s forwards;
        }

        /* The Animation: Zoom In, Wait 7s, Shrink */
        @keyframes gifAutoTimer {
            0% { transform: scale(0); opacity: 0; }
            7% { transform: scale(1); opacity: 1; }   
            93% { transform: scale(1); opacity: 1; }  
            100% { transform: scale(0); opacity: 0; } 
        }


        /* AI Style Gemini Watermark */
        .ai-watermark {
            position: absolute; 
            bottom: 20px; 
            left: 20px; 
            font-size: 1rem; 
            color: rgba(255, 255, 255, 0.6); 
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 1px;
            pointer-events: none; 
            user-select: none;
            z-index: 50;
        }
        
        .ai-watermark span {
            font-size: 1.2rem; 
        }

        /* --- MUSIC PLAYER WIDGET --- */
        #music-player {
            display: none; 
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255, 20, 147, 0.4);
            border-radius: 30px;
            padding: 5px 12px;
            align-items: center;
            gap: 10px;
            z-index: 50;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 10px rgba(255, 20, 147, 0.2);
        }

        .cd-icon {
            width: 24px;
            height: 24px;
            background: conic-gradient(from 0deg, #555, #ccc, #555, #ccc, #555);
            border-radius: 50%;
            border: 2px solid #ff1493;
            position: relative;
            animation: spinCD 3s linear infinite;
        }

        .cd-icon::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 6px; height: 6px;
            background: #000;
            border-radius: 50%;
            border: 1px solid #ff1493;
        }

        .cd-icon.paused {
            animation-play-state: paused;
        }

        @keyframes spinCD {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .track-info {
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        .track-name {
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: #ffb6c1;
            margin-bottom: 3px;
        }

        .music-controls {
            display: flex;
            gap: 8px;
            font-size: 0.9rem;
        }

        .music-btn {
            cursor: pointer;
            user-select: none;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .music-btn:hover {
            opacity: 1;
            color: #ff1493;
        }

        /* ========================================================= */

    </style>
</head>
<body>

    <audio id="bgm-audio" src="YOUR_SONG_URL_HERE.mp3" loop></audio>

    <div id="magic-overlay">
        <canvas id="particleCanvas"></canvas>
    </div>

    </div>

    <div id="music-player">
        <div class="cd-icon" id="cd-spinner"></div>
        <div class="track-info">
            <span class="track-name">birthday</span>
            <div class="music-controls">
                <span class="music-btn" id="play-pause-btn">⏸</span>
                <span class="music-btn" id="vol-down-btn">🔉</span>
                <span class="music-btn" id="vol-up-btn">🔊</span>
            </div>
        </div>
    </div>

    <div class="ai-watermark"><span>✨</span> -vinay</div>

    <div id="master-screen">
        <canvas id="rainCanvas"></canvas>
        
        <div id="countdown-wrapper">
            <div id="countdown-number">3</div>
            <div id="countdown-box">-Ruko zara... 👀</div>
        </div>

        <div id="final-website">
            <div id="led-text">HAPPY</div>
        </div>

        <div id="gif-phase">
            <img class="central-gif" id="main-gif" src="birthday.gif" alt="Surprise GIF">
        </div>

    </div>

    <script>
        // =========================================================
        // --- 7. JAVASCRIPT LOGIC ---
        // =========================================================

        let hasStarted = false; 

        // --- PART 1: SMOOTH CONTINUOUS FLOATING ROSE PETALS ---
        const pCanvas = document.getElementById('particleCanvas');
        const pCtx = pCanvas.getContext('2d');
        let particlesArray = [];
        const numberOfParticles = 50; 

        function resizeCanvases() {
            pCanvas.width = window.innerWidth; 
            pCanvas.height = window.innerHeight;
            rCanvas.width = window.innerWidth; 
            rCanvas.height = window.innerHeight;
            
            if (countdownStarted) {
                const columns = Math.ceil(rCanvas.width / fontSize);
                while(rainDrops.length < columns) {
                    rainDrops.push(1);
                }
            }
        }

        class FloatingPetal {
            constructor() {
                this.x = Math.random() * window.innerWidth; 
                this.y = Math.random() * window.innerHeight; 
                this.vx = (Math.random() - 0.5) * 1.5; 
                this.vy = (Math.random() - 0.5) * 1.5 + 0.5; 
                this.sizeBase = Math.random() * 8 + 4;
                this.scale = Math.random() * 0.6 + 0.4;
                this.sizeX = this.sizeBase * 1.5 * this.scale; 
                this.sizeY = this.sizeBase * 2.5 * this.scale; 
                this.rotation = Math.random() * 360; 
                this.rotationSpeed = (Math.random() - 0.5) * 2; 

                this.opacity = this.scale < 0.6 ? 0.4 : (this.scale > 0.8 ? 0.9 : 0.6);
                const isBright = Math.random() > 0.5;
                this.color = isBright ? `rgba(255, 105, 180, ${this.opacity})` : `rgba(255, 20, 147, ${this.opacity})`; 
                this.glow = isBright ? 'rgba(255, 182, 193, 0.5)' : 'rgba(255, 105, 180, 0.5)';
            }

            update() {
                this.x += this.vx; this.y += this.vy;
                this.vy += (Math.random() - 0.5) * 0.05; 
                this.vx += (Math.random() - 0.5) * 0.05; 

                if (this.x > pCanvas.width + this.sizeX) this.x = -this.sizeX;
                if (this.x < -this.sizeX) this.x = pCanvas.width + this.sizeX;
                if (this.y > pCanvas.height + this.sizeY) this.y = -this.sizeY;
                if (this.y < -this.sizeY) this.y = pCanvas.height + this.sizeY;

                this.rotation += this.rotationSpeed; 
            }

            draw() {
                pCtx.save();
                pCtx.translate(this.x, this.y);
                pCtx.rotate((this.rotation * Math.PI) / 180);
                pCtx.shadowBlur = 8; 
                pCtx.shadowColor = this.glow;
                pCtx.fillStyle = this.color;
                pCtx.beginPath();
                pCtx.moveTo(0, -this.sizeY / 2);
                pCtx.bezierCurveTo(this.sizeX / 2, -this.sizeY / 2, this.sizeX / 2, this.sizeY / 2, 0, this.sizeY / 2);
                pCtx.bezierCurveTo(-this.sizeX / 2, this.sizeY / 2, -this.sizeX / 2, -this.sizeY / 2, 0, -this.sizeY / 2);
                pCtx.fill();
                pCtx.restore();
            }
        }

        function initFloatingRoses() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new FloatingPetal());
            }
        }

        function animateFloatingRoses() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height); 
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update(); 
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateFloatingRoses); 
        }

        window.addEventListener('load', () => {
            resizeCanvases();
            initFloatingRoses();
            animateFloatingRoses();
        });


        // --- PART 2: MATRIX RAIN LOGIC ---
        const rCanvas = document.getElementById('rainCanvas');
        const rCtx = rCanvas.getContext('2d');
        const rainChars = "HAPPYBIRTHDAY".split("");
        
        const fontSize = 16; 
        let rainDrops = [];
        let rainInterval;

        function initMatrixRain() {
            const columns = Math.ceil(rCanvas.width / fontSize);
            rainDrops = [];
            for(let x = 0; x < columns; x++) { rainDrops[x] = 1; }
            rainInterval = setInterval(drawMatrixRain, 50); 
        }

        function drawMatrixRain() {
            rCtx.fillStyle = "rgba(0, 0, 0, 0.15)"; 
            rCtx.fillRect(0, 0, rCanvas.width, rCanvas.height);
            
            rCtx.font = "900 " + fontSize + "px 'Courier New', monospace"; 
            
            for(let i = 0; i < rainDrops.length; i++) {
                const text = rainChars[Math.floor(rainDrops[i]) % rainChars.length];
                
                if (Math.random() > 0.8) { rCtx.fillStyle = "#ff69b4"; } 
                else { rCtx.fillStyle = "#c71585"; } 

                rCtx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                
                if(rainDrops[i] * fontSize > rCanvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        // --- PART 3: PHASE SEQUENCING ---
        let countdownStarted = false;

        function startSequence() {
            countdownStarted = true;
            const masterScreen = document.getElementById('master-screen');
            const countdownNumber = document.getElementById('countdown-number');
            const countdownBox = document.getElementById('countdown-box');
            
            masterScreen.style.display = 'flex';
            initMatrixRain(); 

            // Phase 1: Countdown
            let count = 3;
            const countInterval = setInterval(() => {
                count--;
                if (count === 2) {
                    countdownNumber.innerText = count;
                    countdownBox.innerText = "wait karo aaj ka star aane wala hai🎀";
                } else if (count === 1) {
                    countdownNumber.innerText = count;
                    countdownBox.innerText = "wishing to you";
                    countdownBox.classList.add('attractive-wish'); 
                } else {
                    clearInterval(countInterval);
                    revealLEDSequence(); 
                }
            }, 1333); 
        }

        function revealLEDSequence() {
            document.getElementById('countdown-wrapper').style.display = 'none';
            
            const finalWebsite = document.getElementById('final-website');
            finalWebsite.style.display = 'flex';

            const ledText = document.getElementById('led-text');
            const sequenceWords = ["HAPPY", "BIRTHDAY", "TO", "YOU"];
            let step = 0;
            
            ledText.innerText = sequenceWords[step]; 

            const wordInterval = setInterval(() => {
                step++;
                if (step < sequenceWords.length) {
                    ledText.innerText = sequenceWords[step];
                } else {
                    clearInterval(wordInterval);
                    setTimeout(revealGifPhase, 1000);
                }
            }, 1333); 
        }

        function revealGifPhase() {
            document.getElementById('final-website').style.display = 'none';
            
            const gifPhase = document.getElementById('gif-phase');
            gifPhase.style.display = 'flex';
            
            document.getElementById('music-player').style.display = 'flex';
            
            const audio = document.getElementById('bgm-audio');
            audio.volume = 0.5;
            audio.play().catch(e => console.log("User interaction required to play audio"));
            
            setTimeout(() => {
                document.getElementById('main-gif').classList.add('zoom-in');
            }, 50);
        }

// --- AUDIO PLAYER CONTROLS LOGIC ---
const audio = new Audio('birthday.mp3');
audio.loop = true;
audio.pause(); // Initial state pause rakha hai

const playPauseBtn = document.getElementById('play-pause-btn');
const cdSpinner = document.getElementById('cd-spinner');
const volDownBtn = document.getElementById('vol-down-btn');
const volUpBtn = document.getElementById('vol-up-btn');

// Poori screen (document.body) par click event lagaya
document.body.addEventListener('click', (e) => {
    // Agar user ne volume buttons par click kiya hai, toh audio toggle mat karo
    if (e.target === volDownBtn || e.target === volUpBtn || e.target === playPauseBtn) return;

    toggleMusic();
});

// Play/Pause button ke liye alag se functionality
playPauseBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleMusic();
});

function toggleMusic() {
    if (audio.paused) {
        audio.play();
        playPauseBtn.innerText = '⏸';
        cdSpinner.classList.remove('paused');
    } else {
        audio.pause();
        playPauseBtn.innerText = '▶️';
        cdSpinner.classList.add('paused');
    }
}

volDownBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (audio.volume > 0.1) audio.volume -= 0.1;
    else audio.volume = 0;
});

volUpBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (audio.volume < 0.9) audio.volume += 0.1;
    else audio.volume = 1;
});

        // --- 8. EVENT LISTENERS ---

        // =========================================================
        // --- 8. DIRECT AUTO-START LOGIC ---
        // =========================================================
        
        window.addEventListener('load', () => {
            // 1. Start the background petals immediately
            resizeCanvases();
            initFloatingRoses();
            animateFloatingRoses();

            // 2. Wait 1 second, then trigger the Matrix rain and countdown
            setTimeout(() => {
                if (!hasStarted) {
                    hasStarted = true; 
                    startSequence(); // This is the engine that starts the website
                }
            }, 1000); 
        });

        // 3. Keep the canvas size correct if the screen changes size
        window.addEventListener('resize', resizeCanvases);

    
    </script>

</body>
</html>
