<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Senses Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background -->
    <div class="bg-animation"></div>
    
    <!-- Header -->
    <header>
        <h1 class="title">🌟 Five Senses</h1>
        <p class="subtitle">Experience the world through your senses</p>
    </header>

    <!-- Main Senses Grid -->
    <main class="senses-grid">
        <div class="sense-card" data-sense="touch">
            <div class="sense-icon">✋</div>
            <h2>Touch</h2>
            <p>Feel the texture</p>
            <button class="sense-btn">Experience</button>
        </div>
        
        <div class="sense-card" data-sense="smell">
            <div class="sense-icon">👃</div>
            <h2>Smell</h2>
            <p>Discover aromas</p>
            <button class="sense-btn">Experience</button>
        </div>
        
        <div class="sense-card" data-sense="taste">
            <div class="sense-icon">👅</div>
            <h2>Taste</h2>
            <p>Savor the flavor</p>
            <button class="sense-btn">Experience</button>
        </div>
        
        <div class="sense-card" data-sense="hear">
            <div class="sense-icon">👂</div>
            <h2>Hear</h2>
            <p>Listen closely</p>
            <button class="sense-btn">Experience</button>
        </div>
        
        <div class="sense-card" data-sense="sight">
            <div class="sense-icon">👁️</div>
            <h2>Sight</h2>
            <p>See the beauty</p>
            <button class="sense-btn">Experience</button>
        </div>
    </main>

    <!-- Audio Player -->
    <audio id="senseAudio" preload="auto"></audio>

    <!-- Particles Canvas -->
    <canvas id="particles"></canvas>

    <script src="script.js"></script>
</body>
</html>
