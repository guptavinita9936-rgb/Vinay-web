<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="main-frame">
        
        <div id="music-container">
            <button id="music-btn">🎵</button>
            <audio id="bg-music" loop>
                <source src="music.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div id="screens-wrapper">
            
            <div id="loading-screen" class="active">
                <p class="loading-text">Dang tải...</p>
                <p class="sub-text">Chờ đợi là hạnh phúc!</p>
            </div>

            <div id="matrix-container">
                </div>

            <div id="celebration-scene">
                <img src="birthday.gif" alt="Birthday Cat" class="cat-gif">
                <h1 class="final-text">HAPPY BIRTHDAY!</h1>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
