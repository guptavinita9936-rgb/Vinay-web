<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="music-container">
        <button id="play-pause-btn"><i class="fas fa-music"></i></button>
        <audio id="bg-music" loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div id="wrapper">
        <div id="loader" class="screen active">
            <div class="spinner"></div>
            <p>Dang tải...</p>
            <p class="wait-text">Chờ đợi là hạnh phúc!</p>
        </div>

        <div id="matrix-screen" class="screen">
            <div id="matrix-grid"></div>
        </div>

        <div id="celebration-screen" class="screen">
            <div class="content-box">
                <img src="cat-celebration.gif" id="main-cat" alt="Happy Birthday">
                <h2 id="final-wish">HAPPY BIRTHDAY!</h2>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
